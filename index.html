<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twaron Shop - Bán đủ thứ</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #eef2f3; color: #333; }
        .search-box { margin-bottom: 30px; text-align: center; }
        input { padding: 12px; width: 80%; max-width: 500px; border-radius: 25px; border: 2px solid #2ecc71; outline: none; font-size: 16px; }
        .product-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; background: #ddd; }
        .price { color: #e67e22; font-weight: bold; font-size: 1.2em; margin: 10px 0; }
        .tag { font-size: 0.75em; color: #27ae60; background: #d5f5e3; padding: 3px 8px; border-radius: 10px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="search-box">
    <h1>🌿 Twaron Shop</h1>
    <p>Tìm gì cũng có - Cần gì cũng ra</p>
    <input type="text" id="searchInput" placeholder="Nhập tên cây, loại hoặc tính chất (vd: phong thuy)..." onkeyup="search()">
</div>
<a href="https://zalo.me" target="_blank" 
   style="background: #0068ff; color: white; padding: 10px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px;">
   Nhắn tin mua ngay
</a>

<div class="product-container" id="productList"></div>

<script>
    let products = [];
    let fuse;

    fetch('data.json')
        .then(res => res.json())
        .then(data => {
            products = data;
            fuse = new Fuse(products, { keys: ['name', 'tags', 'category'], threshold: 0.4 });
            displayProducts(products);
        });

    function displayProducts(list) {
        document.getElementById('productList').innerHTML = list.map(item => `
            <div class="card">
                <img src="https://picsum.photos{item.id}/400/300" alt="${item.name}">
                <h3>${item.name}</h3>
                <div class="price">${item.price}</div>
                <div>${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <p style="font-size: 0.9em; color: #666;">${item.description}</p>
            </div>
        `).join('');
    }

    function search() {
        const query = document.getElementById('searchInput').value;
        displayProducts(query ? fuse.search(query).map(r => r.item) : products);
    }
</script>
</body>
</html>
